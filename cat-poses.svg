      <!-- внутренние уши -->
      <path d="M130 -12 C130 -36 146 -40 164 -28 C188 -12 214 8 234 30 C209 37 197 49 195 64 C180 66 171 77 171 89 C158 87 146 100 140 118 C124 95 130 30 130 -12 Z"/>
      <path d="M454 -12 C454 -36 438 -40 420 -28 C396 -12 370 8 350 30 C375 37 387 49 389 64 C404 66 413 77 413 89 C426 87 438 100 444 118 C460 95 454 30 454 -12 Z"/>
    </g>

    <g id="cat-face">
      <ellipse cx="216" cy="205" rx="29" ry="33" fill="#000"/>
      <ellipse cx="368" cy="205" rx="29" ry="33" fill="#000"/>
      <circle cx="205" cy="191" r="9" fill="#fff"/>
      <circle cx="357" cy="191" r="9" fill="#fff"/>
      <circle cx="228" cy="217" r="4" fill="#fff"/>
      <circle cx="380" cy="217" r="4" fill="#fff"/>
