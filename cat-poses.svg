  <g transform="translate(10,56)">
    <use href="#cat-head"/>
    <path d="M176 366 C146 402 132 454 140 494 C146 526 174 538 198 524 C214 550 244 560 286 558 C328 560 358 550 374 524 C398 538 426 526 432 494 C440 454 426 402 396 366 C372 338 346 322 334 300 C342 352 330 408 302 452 C296 460 292 468 286 468 C280 468 276 460 270 452 C242 408 230 352 238 300 C226 322 200 338 176 366 Z" fill="#fff" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M252 388 C270 412 280 448 286 468 C292 448 302 412 320 388" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <path d="M154 474 C140 490 140 512 156 522" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <path d="M418 474 C432 490 432 512 416 522" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <use href="#paw-cuts" transform="translate(-8,16)"/>
    <use href="#paw-cuts" transform="translate(74,18)"/>
    <use href="#paw-cuts" transform="translate(154,16)"/>
    <use href="#tail"/>
    <use href="#cat-face"/>
