    <ellipse cx="278" cy="538" rx="34" ry="22" fill="#fff" stroke="#000" stroke-width="8"/>
    <path d="M566 498 C634 510 690 470 694 414 C698 370 670 328 632 330 C604 332 586 356 596 378 C606 400 630 406 630 430 C630 460 598 490 562 484" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <use href="#cat-face" transform="translate(12,6) scale(0.86)"/>
