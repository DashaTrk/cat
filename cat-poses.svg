  <g transform="translate(1270,56)">
    <use href="#cat-head"/>
    <path d="M186 364 C158 402 146 452 154 494 C160 526 186 540 210 526 C226 550 252 560 286 558 C320 560 346 550 362 526 C386 540 412 526 418 494 C426 452 414 402 386 364" fill="#fff" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M172 378 C144 418 130 474 146 514 C162 548 198 544 212 512" fill="#fff" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M352 358 C388 334 426 296 418 258 C412 228 380 220 360 240 C344 258 346 286 366 302" fill="#fff" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M438 172 L468 150 M450 200 L488 190 M452 228 L490 230" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <path d="M248 386 C266 410 278 442 286 470 C294 442 306 410 324 386" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <use href="#paw-cuts" transform="translate(72,18)"/>
    <use href="#tail" transform="translate(-8,0)"/>
    <use href="#cat-face"/>
  </g>

  <!-- 5: стоит -->
  <g transform="translate(1680,56)">
    <use href="#cat-head"/>
    <path d="M186 362 C154 404 146 464 162 512 C174 548 206 554 224 532 L238 438 C240 406 224 376 186 362 Z" fill="#fff" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M398 362 C430 404 438 464 422 512 C410 548 378 554 360 532 L346 438 C344 406 360 376 398 362 Z" fill="#fff" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M238 438 C250 520 262 548 286 548 C310 548 322 520 334 438" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <use href="#paw-cuts" transform="translate(58,28)"/>
