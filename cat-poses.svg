      <path d="M257 254 Q262 270 279 262 Q288 280 292 282 Q296 280 305 262 Q322 270 327 254" fill="none" stroke="#000" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M146 206 L88 202 M145 228 L94 236 M148 250 L110 274" fill="none" stroke="#000" stroke-width="7" stroke-linecap="round"/>
      <path d="M438 206 L496 202 M439 228 L490 236 M436 250 L474 274" fill="none" stroke="#000" stroke-width="7" stroke-linecap="round"/>
    </g>

    <g id="tail" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M430 472 C512 482 578 438 594 376 C606 330 582 286 540 280 C506 274 476 298 478 330 C480 356 504 364 504 392 C504 430 464 462 430 448"/>
    </g>

    <g id="paw-cuts" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round">
