    <path d="M414 456 C468 446 492 390 462 350 C436 316 400 318 378 342" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
    <use href="#cat-face" transform="translate(52,48) scale(0.72)"/>
  </g>

