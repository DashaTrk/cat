<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2100 560" width="2100" height="560" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Милый котенок в 5 позах: сидя, лежа, клубочком, машет лапкой, стоит">
  <title>Котенок в 5 позах, близко к референсу</title>
