<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat pose preview</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ececec;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .frame {
        width: min(92vw, 520px);
      }
      .frame svg,
      .frame img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="Превью котенка">
      <img src="./cat-poses.svg" alt="Котенок сидя" />
    </main>
  </body>
</html>
